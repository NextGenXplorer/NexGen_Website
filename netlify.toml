# =========================
# Netlify Build Configuration
# =========================

[build]
  # Build and export static HTML
  command = "next build"
  # The folder containing the final static site
  publish = "out"

# Environment configuration
[build.environment]
  NODE_VERSION = "22"
  NEXT_TELEMETRY_DISABLED = "1"

# Cache static assets
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
