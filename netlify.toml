# =========================
# Netlify Build Configuration
# =========================

[build]
  # Build Next.js with API routes support
  command = "npm run build"

# Environment configuration
[build.environment]
  NODE_VERSION = "22"
  NEXT_TELEMETRY_DISABLED = "1"

# Netlify Next.js Runtime Plugin (automatically detected)
[[plugins]]
  package = "@netlify/plugin-nextjs"
